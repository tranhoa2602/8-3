<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Lock 💖</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOCK -->
    <div class="lock-box" id="lockBox">
      <img src="picture/pic1.jpg" alt="My Love" />

      <div class="lock-right">
        <div class="heart">💗</div>

        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <div class="keypad">
          <button class="key" onclick="press(1)">1</button>
          <button class="key" onclick="press(2)">2</button>
          <button class="key" onclick="press(3)">3</button>
          <button class="key" onclick="press(4)">4</button>
          <button class="key" onclick="press(5)">5</button>
          <button class="key" onclick="press(6)">6</button>
          <button class="key" onclick="press(7)">7</button>
          <button class="key" onclick="press(8)">8</button>
          <button class="key" onclick="press(9)">9</button>
          <div></div>
          <button class="key" onclick="press(0)">0</button>
          <button class="key" onclick="clearPass()">⌫</button>
        </div>
      </div>
    </div>

    <!-- MENU -->
    <div class="menu" id="menu">
      <div class="menu-grid">
        <div class="card" onclick="openDays()">
          <span>⏳</span>Days Together
        </div>
        <div class="card"><span>💌</span>Letter</div>
        <div class="card"><span>🌸</span>Image</div>
        <div class="card"><span>🎁</span>Gift</div>
      </div>
      <!-- MUSIC PLAYER INSIDE MENU -->
      <div class="music-player">

  <div class="music-left">
    <img src="thumbnail.jpg" alt="thumb">
    <div>
      <div class="music-title">Love Is</div>
      <div class="music-sub">Dangrangto</div>
    </div>
  </div>

  <div class="music-center">
    <div class="controls">
      <button id="prevBtn">⏮</button>
      <button id="playBtn" class="play-btn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>

    <div class="progress-area">
      <span id="currentTime">00:00</span>
      <input type="range" id="progressBar" value="0">
      <span id="duration">00:00</span>
    </div>
  </div>

  <div class="music-right">
    🔊
    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
  </div>

  <audio id="audioPlayer" src="audio/nguyenhaxd - Love Is.mp3"></audio>
</div>

    <!-- DAYS POPUP -->
    <div class="popup" id="daysPopup">
      <div class="popup-card">
        <div class="close-btn" onclick="closeDays()">✕</div>
        <h2>Chúng ta đã bên nhau</h2>
        <div class="days-number" id="daysCount">0</div>
        <p>ngày rồi đó 💖</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
