<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Lock 💖</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- LOCK -->
    <div class="lock-box" id="lockBox">
      <img src="picture/pic1.jpg" alt="My Love" />

      <div class="lock-right">
        <div class="heart">💗</div>

        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <div class="keypad">
          <button class="key" onclick="press(1)">1</button>
          <button class="key" onclick="press(2)">2</button>
          <button class="key" onclick="press(3)">3</button>
          <button class="key" onclick="press(4)">4</button>
          <button class="key" onclick="press(5)">5</button>
          <button class="key" onclick="press(6)">6</button>
          <button class="key" onclick="press(7)">7</button>
          <button class="key" onclick="press(8)">8</button>
          <button class="key" onclick="press(9)">9</button>
          <div></div>
          <button class="key" onclick="press(0)">0</button>
          <button class="key" onclick="clearPass()">⌫</button>
        </div>
      </div>
    </div>

    <!-- MENU -->
    <div class="menu" id="menu">
      <div class="menu-grid">
        <div class="card" onclick="openDays()">
          <span>⏳</span>Days Together
        </div>
        <div class="card" onclick="openLetter()">
          <span>💌</span>Letter
        </div>
        <div class="card" onclick="openImage()"><span>🌸</span>Image</div>
        <div class="card" onclick="openGift()">
          <span>🎁</span>
          <p>Gift</p>
        </div>
      </div>  

      <!-- MUSIC PLAYER INSIDE MENU -->
      <div class="music-player">

  <div class="music-left">
    <div>
      <div class="music-title">Love Is</div>
      <div class="music-sub">Dangrangto</div>
    </div>
  </div>

  <div class="music-center">
    <div class="controls">
      <button id="prevBtn">⏮</button>
      <button id="playBtn" class="play-btn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>

    <div class="progress-area">
      <span id="currentTime">00:00</span>
      <input type="range" id="progressBar" value="0">
      <span id="duration">00:00</span>
    </div>
  </div>

  <div class="music-right">
    🔊
    <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
  </div>

  <audio id="audioPlayer" src="audio/Love Is.mp3"></audio>
</div>

    <!-- DAYS POPUP -->
    <div class="popup" id="daysPopup">
      <div class="popup-card">
        <div class="close-btn" onclick="closeDays()">✕</div>
        <h2>Chúng ta đã bên nhau</h2>
        <div class="days-number" id="daysCount">0</div>
        <p>ngày rồi đó 💖</p>
      </div>
    </div>

    <!-- LETTER POPUP -->
<div class="popup" id="letterPopup">
  <div class="popup-card">
    <div class="close-btn" onclick="closeLetter()">✕</div>
    <h2>💌 Gửi Chị Iu</h2>
    <p id="letterText"></p>
  </div>
</div>

<!-- IMAGE POPUP -->
<div class="popup" id="imagePopup">
  <div class="popup-card image-card">
    <div class="close-btn" onclick="closeImage()">✕</div>
    <h2>📸 Ảnh Xinh</h2>

    <div class="carousel">
      <div class="carousel-track">
        <img src="picture/pic1.jpg">
        <img src="picture/pic2.jpg">
        <img src="picture/pic3.jpg">
        <img src="picture/pic4.jpg">
        <img src="picture/pic5.jpg">
        <img src="picture/pic6.jpg">
        <img src="picture/pic7.jpg">
        <img src="picture/pic8.jpg">

        <img src="picture/pic1.jpg">
        <img src="picture/pic2.jpg">
        <img src="picture/pic3.jpg">
        <img src="picture/pic4.jpg">
        <img src="picture/pic5.jpg">
        <img src="picture/pic6.jpg">
        <img src="picture/pic7.jpg">
        <img src="picture/pic8.jpg">
      </div>
    </div>

    <div class="preview">
      <img id="previewImage" src="picture/pic1.jpg">
    </div>

  </div>
</div>

  <!-- GIFT POPUP -->
<div class="popup" id="giftPopup">
  <div class="popup-card">
    <div class="close-btn" onclick="closeGift()">✕</div>
    <h2>🎁 Dành Cho Chị 💕</h2>

    <canvas id="flowerCanvas"></canvas>
    <div id="loveRain"></div>

  </div>
</div>

    <script src="script.js"></script>
  </body>
</html>
